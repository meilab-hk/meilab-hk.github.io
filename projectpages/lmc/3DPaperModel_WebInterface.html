<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Paper Model</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: #f5f5f5;
            touch-action: none; 
        }
        header {
            background-color: #333;
            color: white;
            padding: 15px;
            text-align: center;
        }
        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .drawing-section {
            flex: 3;
            display: flex;
            flex-direction: column;
            padding: 15px;
            background-color: #fff;
            border-right: 1px solid #ddd;
        }
        .tools {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
            padding: 10px;
            background-color: #eee;
            border-radius: 5px;
        }
        .tool-btn, .color-btn, .export-btn {
            padding: 8px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            background-color: #4CAF50;
            color: white;
            transition: all 0.3s;
        }
        .tool-btn:hover, .color-btn:hover, .export-btn:hover {
            opacity: 0.85;
        }
        .tool-btn:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
            opacity: 0.6;
        }
        .color-btn {
            width: 30px;
            height: 30px;
            padding: 0;
            border: 2px solid #ddd;
        }
        .size-slider {
            flex: 1;
            min-width: 100px;
            margin: 0 10px;
        }
        .canvas-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #a0a0a0; /* 设置灰色背景作为后备 */
            touch-action: none; /* 防止浏览器默认触摸行为 */
        }
        #drawing-canvas {
            position: absolute;
            top: 0;
            left: 0;
            cursor: crosshair;
            touch-action: none; /* 防止浏览器默认触摸行为 */
            z-index: 2; /* 确保在最上层 */
        }
        #background-canvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none; /* 不干扰鼠标事件 */
            z-index: 1; /* 确保在绘画画布下面 */
        }
        #stroke-canvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 0; /* 放在最下面，不干扰用户交互 */
            opacity: 0; /* 隐藏，仅用于导出 */
        }
        #export-canvas, #mirror-canvas {
            display: none; /* 用于导出，不显示 */
        }
        .export-section {
            flex: 1;
            padding: 15px;
            display: flex;
            flex-direction: column;
            background-color: #f8f8f8;
        }
        .export-btn {
            background-color: #2196F3;
            margin-top: 10px;
            text-align: center;
            padding: 12px;
            font-size: 16px;
        }
        .export-preview {
            flex: 1;
            margin-top: 15px;
            border: 1px solid #ddd;
            background-color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            overflow: auto;
            padding: 10px;
        }
        .preview-container {
            width: 100%;
            max-width: 280px; /* 14cm的一半，用于预览 */
            height: 140px; /* 7cm的一半，用于预览 */
            border: 1px dashed #ccc;
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .preview-img {
            max-width: 100%;
            max-height: 100%;
            background-color: transparent;
        }
        .preview-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 15px;
            width: 100%;
        }
        .preview-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            width: 100%;
        }
        .preview-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 280px;
        }
        .preview-label {
            font-weight: bold;
            margin-bottom: 5px;
            text-align: center;
        }
        .info-text {
            margin-top: 15px;
            color: #666;
            font-size: 14px;
            line-height: 1.5;
        }
        .tool-group {
            display: flex;
            align-items: center;
            margin-left: 10px;
            flex-wrap: wrap;
            gap: 5px;
        }
        .colors-container {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }
        .touch-indicator {
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: rgba(255, 0, 0, 0.5);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 100;
            display: none;
        }
        .custom-color {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 5px;
        }
        .custom-color input[type="color"] {
            width: 30px;
            height: 30px;
            border: none;
            cursor: pointer;
        }
        .dimensions-info {
            text-align: center;
            font-weight: bold;
            margin-bottom: 10px;
        }
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            .drawing-section, .export-section {
                width: 100%;
            }
            .tools {
                flex-direction: column;
                align-items: flex-start;
            }
            .tool-group {
                margin-left: 0;
                margin-top: 5px;
            }
            /* 移动设备上增加按钮尺寸便于触摸 */
            .tool-btn, .export-btn {
                padding: 12px 20px;
                font-size: 16px;
                margin: 3px;
            }
            .color-btn {
                width: 35px;
                height: 35px;
            }
            .preview-row {
                flex-direction: column;
                align-items: center;
            }
            .preview-item {
                margin-bottom: 15px;
            }
        }
    </style>
</head>
<body>
    <header>
        <!--<h1>自由绘画工具</h1>  -->
    </header>
    <div class="container">
        <div class="drawing-section">
            <div class="tools">
                <div class="tool-group">
                    <button class="tool-btn" id="pencil">Pencil</button>
                    <button class="tool-btn" id="eraser">Eraser</button> 
                    <button class="tool-btn" id="undo" disabled>Undo</button>
                    <button class="tool-btn" id="clear">Clean canvas</button>
                </div>
                <div class="tool-group">
                    <span>Width</span>
                    <input type="range" min="1" max="50" value="5" class="size-slider" id="size-slider">
                    <span id="size-value">5px</span>
                </div>
                <div class="tool-group">
                    <span>Color:</span>
                    <div class="colors-container">
                        <button class="color-btn" style="background-color: #000000;" data-color="#000000"></button>
                        <button class="color-btn" style="background-color: #808080;" data-color="#808080"></button>
                        <button class="color-btn" style="background-color: #c0c0c0;" data-color="#c0c0c0"></button>
                        <button class="color-btn" style="background-color: #ffffff; border: 1px solid #ccc;" data-color="#ffffff"></button>
                        <button class="color-btn" style="background-color: #ff0000;" data-color="#ff0000"></button>
                        <button class="color-btn" style="background-color: #00ff00;" data-color="#00ff00"></button>
                        <button class="color-btn" style="background-color: #0000ff;" data-color="#0000ff"></button>
                        <button class="color-btn" style="background-color: #ffff00;" data-color="#ffff00"></button>
                        <button class="color-btn" style="background-color: #ff00ff;" data-color="#ff00ff"></button>
                        <button class="color-btn" style="background-color: #00ffff;" data-color="#00ffff"></button>
                    </div>
                    <div class="custom-color">
                        <span>Customized color</span>
                        <input type="color" id="custom-color-picker" value="#000000">
                    </div>
                </div>
            </div>
            <div class="canvas-container">
                <canvas id="background-canvas"></canvas>
                <canvas id="drawing-canvas"></canvas>
                <canvas id="stroke-canvas"></canvas>
                <div class="touch-indicator" id="touch-indicator"></div>
            </div>
        </div>
        <div class="export-section">
            <h2>Export</h2>
            <p class="info-text">After finishing the painting, you can click the button below to export the image.</p>
            <button class="export-btn" id="export-png">Export to PNG format (original and mirrored)</button>
            <div class="export-preview">
                <div class="dimensions-info">Preview (14cm × 7cm, black trace)</div>
                <div class="preview-section">
                    <div class="preview-row">
                        <div class="preview-item">
                            <div class="preview-label">original</div>
                            <div class="preview-container">
                                <img id="preview-img-original" class="preview-img" />
                            </div>
                        </div>
                        <div class="preview-item">
                            <div class="preview-label">mirrored</div>
                            <div class="preview-container">
                                <img id="preview-img-mirror" class="preview-img" />
                            </div>
                        </div>
                    </div>
                </div>
                <div id="export-info">
                    <p class="info-text">The export preview will be shown here</p>
                </div>
            </div>
        </div>
    </div>
    <canvas id="export-canvas" width="1654" height="827"></canvas><!-- 14cm×7cm @ 300dpi = 1654×827px -->
    <canvas id="mirror-canvas" width="1654" height="827"></canvas><!-- 用于镜像图像 -->

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const canvas = document.getElementById('drawing-canvas');
            const ctx = canvas.getContext('2d');
            const backgroundCanvas = document.getElementById('background-canvas');
            const bgCtx = backgroundCanvas.getContext('2d');
            const strokeCanvas = document.getElementById('stroke-canvas');
            const strokeCtx = strokeCanvas.getContext('2d');
            const exportCanvas = document.getElementById('export-canvas');
            const exportCtx = exportCanvas.getContext('2d');
            const mirrorCanvas = document.getElementById('mirror-canvas');
            const mirrorCtx = mirrorCanvas.getContext('2d');
            const previewImgOriginal = document.getElementById('preview-img-original');
            const previewImgMirror = document.getElementById('preview-img-mirror');
            const exportInfo = document.getElementById('export-info');
            const sizeSlider = document.getElementById('size-slider');
            const sizeValue = document.getElementById('size-value');
            const undoBtn = document.getElementById('undo');
            const touchIndicator = document.getElementById('touch-indicator');
            const customColorPicker = document.getElementById('custom-color-picker');
            
            // 导出参数（14cm × 7cm @ 300dpi）
            const EXPORT_WIDTH = 1654; // 14cm × 300dpi / 2.54 = 1654 pixels
            const EXPORT_HEIGHT = 827; // 7cm × 300dpi / 2.54 = 827 pixels
            
            // 历史记录数组，用于撤销功能
            const history = [];
            const strokes = []; // 存储每一笔的信息
            let historyIndex = -1;
            const MAX_HISTORY = 20; // 限制历史记录数量，防止内存占用过大
            
            // 当前笔画的点集
            let currentStroke = null;
            
            // 白色竖条区域
            let whiteStrips = { leftX: 0, rightX: 0, width: 0, spacing: 0 };
            
            // 设置画布尺寸并初始化背景
            function resizeCanvas() {
                const container = document.querySelector('.canvas-container');
                
                // 设置所有画布的尺寸
                canvas.width = container.clientWidth;
                canvas.height = container.clientHeight;
                backgroundCanvas.width = canvas.width;
                backgroundCanvas.height = canvas.height;
                strokeCanvas.width = canvas.width;
                strokeCanvas.height = canvas.height;
                
                // 重新初始化画布
                initializeCanvas();
            }
            
            // 初始化画布背景和两条白色竖线
            function initializeCanvas() {
                // 绘制灰色背景 (仅在背景画布上绘制)
                bgCtx.fillStyle = '#a0a0a0';
                bgCtx.fillRect(0, 0, backgroundCanvas.width, backgroundCanvas.height);
                
                // 计算白色区域的位置
                const stripWidth = backgroundCanvas.width * 0.04; // 条的宽度为画布宽度的4%
                const spacing = backgroundCanvas.width * 0.05; // 两条之间的间隔为画布宽度的5%
                const leftStripX = (backgroundCanvas.width - stripWidth * 2 - spacing) / 2;
                
                // 保存白色竖条的信息
                whiteStrips = {
                    leftX: leftStripX,
                    rightX: leftStripX + stripWidth + spacing,
                    width: stripWidth,
                    spacing: spacing
                };
                
                // 绘制两条白色竖线区域 (在背景画布上)
                bgCtx.fillStyle = '#a0a0a0';
                
                // 左侧白色区域
                bgCtx.fillRect(whiteStrips.leftX, 0, whiteStrips.width, backgroundCanvas.height);
                
                // 右侧白色区域
                bgCtx.fillRect(whiteStrips.rightX, 0, whiteStrips.width, backgroundCanvas.height);
                
                // 清空主绘画画布
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // 清空绘画轨迹画布
                strokeCtx.clearRect(0, 0, strokeCanvas.width, strokeCanvas.height);
                
                // 清空笔画数据
                strokes.length = 0;
                
                // 保存初始状态到历史记录
                saveState();
            }
            
            // 初始化画布
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();
            
            // 绘画状态
            let isDrawing = false;
            let currentTool = 'pencil';
            let lineWidth = 5;
            let strokeColor = '#000000';
            let isFirstStroke = true;
            let isTouchDevice = false; // 检测是否为触屏设备
            
            // 检测是否为触屏设备
            window.addEventListener('touchstart', function() {
                isTouchDevice = true;
            }, {once: true});
            
            // 鼠标事件绑定
            canvas.addEventListener('mousedown', startDrawing);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', stopDrawing);
            canvas.addEventListener('mouseout', stopDrawing);
            
            // 触屏设备支持 - 增强版
            canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
            canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
            canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
            canvas.addEventListener('touchcancel', handleTouchEnd, { passive: false });
            
            // 工具选择
            document.getElementById('pencil').addEventListener('click', () => setTool('pencil'));
            document.getElementById('eraser').addEventListener('click', () => setTool('eraser'));
            document.getElementById('clear').addEventListener('click', clearCanvas);
            document.getElementById('undo').addEventListener('click', undo);
            
            // 设置线条粗细
            sizeSlider.addEventListener('input', function() {
                lineWidth = this.value;
                sizeValue.textContent = lineWidth + 'px';
            });
            
            // 颜色选择
            document.querySelectorAll('.color-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    strokeColor = this.getAttribute('data-color');
                    customColorPicker.value = strokeColor;
                    document.querySelectorAll('.color-btn').forEach(b => {
                        b.style.borderColor = b === this ? '#333' : '#ddd';
                    });
                    if (currentTool === 'eraser') setTool('pencil');
                });
            });
            
            // 自定义颜色选择器
            customColorPicker.addEventListener('input', function() {
                strokeColor = this.value;
                // 取消其他颜色按钮的选中状态
                document.querySelectorAll('.color-btn').forEach(b => {
                    b.style.borderColor = '#ddd';
                });
                if (currentTool === 'eraser') setTool('pencil');
            });
            
            // 导出按钮
            document.getElementById('export-png').addEventListener('click', exportAsPNG);
            
            // 设置工具
            function setTool(tool) {
                currentTool = tool;
                document.querySelectorAll('.tool-btn').forEach(btn => {
                    if (btn.id !== 'undo' && btn.id !== 'clear') {
                        btn.style.backgroundColor = btn.id === tool ? '#333' : '#4CAF50';
                    }
                });
                
                // 根据工具设置不同的鼠标样式
                if (tool === 'eraser') {
                    canvas.style.cursor = 'cell';
                } else {
                    canvas.style.cursor = 'crosshair';
                }
            }
            
            // 保存当前状态到历史记录
            function saveState() {
                // 如果当前不是最新状态，删除后面的历史记录
                if (historyIndex < history.length - 1) {
                    history.splice(historyIndex + 1);
                }
                
                // 添加当前绘画状态
                history.push(canvas.toDataURL());
                historyIndex = history.length - 1;
                
                // 限制历史记录数量
                if (history.length > MAX_HISTORY) {
                    history.shift();
                    historyIndex--;
                }
                
                // 更新撤销按钮状态
                updateUndoButton();
                
                // 更新预览（使用1px线条重绘并缩放到指定尺寸）
                renderExportPreview();
            }
            
            // 更新撤销按钮状态
            function updateUndoButton() {
                undoBtn.disabled = historyIndex <= 0;
            }
            
            // 撤销功能
            function undo() {
                if (historyIndex > 0) {
                    historyIndex--;
                    loadState(historyIndex);
                    
                    // 移除最后一笔
                    if (strokes.length > 0) {
                        strokes.pop();
                    }
                    
                    // 重新绘制预览
                    renderExportPreview();
                    
                    updateUndoButton();
                }
            }
            
            // 加载指定历史状态
            function loadState(index) {
                const img = new Image();
                img.onload = function() {
                    // 清空主画布
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    // 加载用户绘制内容
                    ctx.drawImage(img, 0, 0);
                };
                img.src = history[index];
            }
            
            // 获取在画布上的坐标
            function getCanvasCoordinates(e) {
                const rect = canvas.getBoundingClientRect();
                return {
                    x: e.clientX - rect.left,
                    y: e.clientY - rect.top
                };
            }
            
            // 开始绘画 (鼠标)
            function startDrawing(e) {
                // 检查是否为触摸事件模拟的鼠标事件
                if (isTouchDevice && e.pointerType === undefined) {
                    return; // 在触摸设备上忽略非指针事件的鼠标事件
                }
                
                isDrawing = true;
                isFirstStroke = true;
                
                // 创建新的笔画数据
                currentStroke = {
                    tool: currentTool,
                    color: strokeColor,
                    width: lineWidth,
                    points: []
                };
                
                draw(e);
            }
            
            // 显示触摸指示器
            function showTouchIndicator(x, y) {
                touchIndicator.style.display = 'block';
                touchIndicator.style.left = x + 'px';
                touchIndicator.style.top = y + 'px';
            }
            
            // 隐藏触摸指示器
            function hideTouchIndicator() {
                touchIndicator.style.display = 'none';
            }
            
            // 触屏开始绘画
            function handleTouchStart(e) {
                e.preventDefault(); // 阻止默认行为
                
                if (e.touches.length === 1) {
                    const touch = e.touches[0];
                    const rect = canvas.getBoundingClientRect();
                    const x = touch.clientX - rect.left;
                    const y = touch.clientY - rect.top;
                    
                    // 显示触摸指示器
                    showTouchIndicator(touch.clientX, touch.clientY);
                    
                    isDrawing = true;
                    isFirstStroke = true;
                    
                    // 创建新的笔画数据
                    currentStroke = {
                        tool: currentTool,
                        color: strokeColor,
                        width: lineWidth,
                        points: []
                    };
                    
                    // 设置绘画样式 - 主画布
                    ctx.lineWidth = lineWidth;
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    
                    if (currentTool === 'eraser') {
                        ctx.strokeStyle = 'white';
                        ctx.globalCompositeOperation = 'destination-out';
                    } else {
                        ctx.strokeStyle = strokeColor;
                        ctx.globalCompositeOperation = 'source-over';
                    }
                    
                    // 添加点到笔画数据
                    currentStroke.points.push({x, y});
                    
                    // 开始绘制 - 主画布
                    ctx.beginPath();
                    ctx.moveTo(x, y);
                    
                    isFirstStroke = false;
                }
            }
            
            // 触屏移动
            function handleTouchMove(e) {
                e.preventDefault(); // 阻止默认行为
                
                if (!isDrawing) return;
                
                if (e.touches.length === 1) {
                    const touch = e.touches[0];
                    const rect = canvas.getBoundingClientRect();
                    const x = touch.clientX - rect.left;
                    const y = touch.clientY - rect.top;
                    
                    // 更新触摸指示器位置
                    showTouchIndicator(touch.clientX, touch.clientY);
                    
                    // 添加点到笔画数据
                    currentStroke.points.push({x, y});
                    
                    // 绘制线条 - 主画布
                    ctx.lineTo(x, y);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(x, y);
                }
            }
            
            // 触屏结束
            function handleTouchEnd(e) {
                e.preventDefault(); // 阻止默认行为
                
                if (isDrawing) {
                    isDrawing = false;
                    ctx.beginPath();
                    
                    // 保存笔画数据
                    if (currentStroke && currentStroke.points.length > 0) {
                        strokes.push(currentStroke);
                        currentStroke = null;
                    }
                    
                    saveState(); // 保存当前状态到历史记录
                }
                
                // 隐藏触摸指示器
                hideTouchIndicator();
            }
            
            // 绘画 (鼠标)
            function draw(e) {
                if (!isDrawing) return;
                
                // 检查是否为触摸事件模拟的鼠标事件
                if (isTouchDevice && e.pointerType === undefined) {
                    return; // 在触摸设备上忽略非指针事件的鼠标事件
                }
                
                // 获取鼠标相对于画布的位置
                const coords = getCanvasCoordinates(e);
                
                // 添加点到笔画数据
                if (currentStroke) {
                    currentStroke.points.push({x: coords.x, y: coords.y});
                }
                
                // 自由绘画 - 主画布
                ctx.lineWidth = lineWidth;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                
                if (currentTool === 'eraser') {
                    ctx.strokeStyle = 'white';
                    ctx.globalCompositeOperation = 'destination-out';
                } else {
                    ctx.strokeStyle = strokeColor;
                    ctx.globalCompositeOperation = 'source-over';
                }
                
                // 如果是第一笔，先移动到起点 - 主画布
                if (isFirstStroke) {
                    ctx.beginPath();
                    ctx.moveTo(coords.x, coords.y);
                    isFirstStroke = false;
                }
                
                // 绘制线条 - 主画布
                ctx.lineTo(coords.x, coords.y);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(coords.x, coords.y);
            }
            
            // 停止绘画 (鼠标)
            function stopDrawing() {
                if (isDrawing) {
                    isDrawing = false;
                    ctx.beginPath();
                    
                    // 保存笔画数据
                    if (currentStroke && currentStroke.points.length > 0) {
                        strokes.push(currentStroke);
                        currentStroke = null;
                    }
                    
                    saveState(); // 保存当前状态到历史记录
                }
            }
            
            // 清空画布并重新初始化
            function clearCanvas() {
                ctx.clearRect(0, 0, canvas.width, canvas.height); // 清空主画布（用户绘制内容）
                // 背景画布（灰色背景和白色竖条）保持不变
                
                // 清空笔画数据
                strokes.length = 0;
                
                saveState(); // 保存清空后的状态到历史记录
                renderExportPreview(); // 更新预览
            }
            
            // 获取有效的铅笔笔画（非橡皮擦）
            function getValidPencilStrokes() {
                return strokes.filter(stroke => stroke.tool === 'pencil');
            }
            
            // 找出绘画内容的边界框
            function findBoundingBox() {
                const pencilStrokes = getValidPencilStrokes();
                if (pencilStrokes.length === 0) return { minX: 0, minY: 0, maxX: canvas.width, maxY: canvas.height };
                
                let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
                
                // 遍历所有铅笔笔画的所有点
                for (const stroke of pencilStrokes) {
                    for (const point of stroke.points) {
                        minX = Math.min(minX, point.x);
                        minY = Math.min(minY, point.y);
                        maxX = Math.max(maxX, point.x);
                        maxY = Math.max(maxY, point.y);
                    }
                }
                
                // 如果没有有效笔画，返回默认值
                if (minX === Infinity) {
                    return { minX: 0, minY: 0, maxX: canvas.width, maxY: canvas.height };
                }
                
                // 添加一点余量
                const padding = 100;
                minX = Math.max(0, minX - padding);
                minY = Math.max(0, minY - padding);
                maxX = Math.min(canvas.width, maxX + padding);
                maxY = Math.min(canvas.height, maxY + padding);
                
                return { minX, minY, maxX, maxY };
            }
            
            // 使用1px黑色线条重绘所有铅笔笔画并缩放到导出尺寸 - 原始图像
            function renderOriginalForExport() {
                // 清空导出画布
                exportCtx.clearRect(0, 0, EXPORT_WIDTH, EXPORT_HEIGHT);
                
                const pencilStrokes = getValidPencilStrokes();
                if (pencilStrokes.length === 0) return null;
                
                // 计算绘画内容的边界
                const bbox = findBoundingBox();
                const contentWidth = bbox.maxX - bbox.minX;
                const contentHeight = bbox.maxY - bbox.minY;
                
                // 保护：防止无效尺寸
                if (contentWidth <= 0 || contentHeight <= 0) {
                    return null;
                }
                
                // 计算缩放比例（保持宽高比，完全适应14cm×7cm）
                let scale;
                if (contentWidth / contentHeight > EXPORT_WIDTH / EXPORT_HEIGHT) {
                    // 以宽度为基准缩放
                    scale = EXPORT_WIDTH / contentWidth;
                } else {
                    // 以高度为基准缩放
                    scale = EXPORT_HEIGHT / contentHeight;
                }
                
                // 计算居中位置
                const offsetX = (EXPORT_WIDTH - contentWidth * scale) / 2;
                const offsetY = (EXPORT_HEIGHT - contentHeight * scale) / 2;
                
                // 只重绘铅笔笔画，使用1px黑色线条并应用缩放
                for (const stroke of pencilStrokes) {
                    if (stroke.points.length < 2) continue;
                    
                    exportCtx.beginPath();
                    exportCtx.lineWidth = 3; // 固定为1px
                    exportCtx.lineCap = 'round';
                    exportCtx.lineJoin = 'round';
                    exportCtx.strokeStyle = '#000000'; // 固定为黑色
                    exportCtx.globalCompositeOperation = 'source-over';
                    
                    // 绘制路径（应用缩放和居中）
                    const firstPoint = stroke.points[0];
                    const scaledX = (firstPoint.x - bbox.minX) * scale + offsetX;
                    const scaledY = (firstPoint.y - bbox.minY) * scale + offsetY;
                    exportCtx.moveTo(scaledX, scaledY);
                    
                    for (let i = 1; i < stroke.points.length; i++) {
                        const scaledX = (stroke.points[i].x - bbox.minX) * scale + offsetX;
                        const scaledY = (stroke.points[i].y - bbox.minY) * scale + offsetY;
                        exportCtx.lineTo(scaledX, scaledY);
                    }
                    exportCtx.stroke();
                }
                
                return exportCanvas.toDataURL('image/png');
            }
            
            // 使用1px黑色线条重绘所有铅笔笔画并缩放到导出尺寸 - 镜像图像
            function renderMirrorForExport() {
                // 清空镜像画布
                mirrorCtx.clearRect(0, 0, EXPORT_WIDTH, EXPORT_HEIGHT);
                
                const pencilStrokes = getValidPencilStrokes();
                if (pencilStrokes.length === 0) return null;
                
                // 计算绘画内容的边界
                const bbox = findBoundingBox();
                const contentWidth = bbox.maxX - bbox.minX;
                const contentHeight = bbox.maxY - bbox.minY;
                
                // 保护：防止无效尺寸
                if (contentWidth <= 0 || contentHeight <= 0) {
                    return null;
                }
                
                // 计算缩放比例（保持宽高比，完全适应14cm×7cm）
                let scale;
                if (contentWidth / contentHeight > EXPORT_WIDTH / EXPORT_HEIGHT) {
                    // 以宽度为基准缩放
                    scale = EXPORT_WIDTH / contentWidth;
                } else {
                    // 以高度为基准缩放
                    scale = EXPORT_HEIGHT / contentHeight;
                }
                
                // 计算居中位置
                const offsetX = (EXPORT_WIDTH - contentWidth * scale) / 2;
                const offsetY = (EXPORT_HEIGHT - contentHeight * scale) / 2;
                
                // 镜像翻转和缩放
                mirrorCtx.save();
                mirrorCtx.translate(EXPORT_WIDTH, 0);
                mirrorCtx.scale(-1, 1);
                
                // 只重绘铅笔笔画，使用1px黑色线条并应用缩放
                for (const stroke of pencilStrokes) {
                    if (stroke.points.length < 2) continue;
                    
                    mirrorCtx.beginPath();
                    mirrorCtx.lineWidth = 2; // 固定为2px
                    mirrorCtx.lineCap = 'round';
                    mirrorCtx.lineJoin = 'round';
                    mirrorCtx.strokeStyle = '#000000'; // 固定为黑色
                    mirrorCtx.globalCompositeOperation = 'source-over';
                    
                    // 绘制路径（应用缩放和居中）
                    const firstPoint = stroke.points[0];
                    const scaledX = (firstPoint.x - bbox.minX) * scale + offsetX;
                    const scaledY = (firstPoint.y - bbox.minY) * scale + offsetY;
                    mirrorCtx.moveTo(scaledX, scaledY);
                    
                    for (let i = 1; i < stroke.points.length; i++) {
                        const scaledX = (stroke.points[i].x - bbox.minX) * scale + offsetX;
                        const scaledY = (stroke.points[i].y - bbox.minY) * scale + offsetY;
                        mirrorCtx.lineTo(scaledX, scaledY);
                    }
                    mirrorCtx.stroke();
                }
                
                // 恢复变换
                mirrorCtx.restore();
                
                return mirrorCanvas.toDataURL('image/png');
            }
            
            // 使用1px黑色线条重绘所有铅笔笔画（用于预览）
            function renderExportPreview() {
                // 清空轨迹画布
                strokeCtx.clearRect(0, 0, strokeCanvas.width, strokeCanvas.height);
                
                const pencilStrokes = getValidPencilStrokes();
                if (pencilStrokes.length === 0) {
                    previewImgOriginal.src = '';
                    previewImgMirror.src = '';
                    return;
                }
                
                // 生成原始导出图像
                const originalDataURL = renderOriginalForExport();
                
                // 生成镜像导出图像
                const mirrorDataURL = renderMirrorForExport();
                
                // 更新预览图片
                if (originalDataURL) {
                    previewImgOriginal.src = originalDataURL;
                } else {
                    previewImgOriginal.src = '';
                }
                
                if (mirrorDataURL) {
                    previewImgMirror.src = mirrorDataURL;
                } else {
                    previewImgMirror.src = '';
                }
            }
            
            // 导出为PNG格式（仅包含铅笔绘画轨迹，黑色1px线条，尺寸为14cm×7cm，原图和镜像）
            function exportAsPNG() {
                const pencilStrokes = getValidPencilStrokes();
                
                // 检查是否有铅笔笔画
                if (pencilStrokes.length === 0) {
                    exportInfo.innerHTML = `
                        <p class="info-text" style="color: orange;">If the canvas is empty or only contains erased content, please use the pencil tool to draw the content first.</p>
                    `;
                    return;
                }
                
                // 生成原始导出图像
                const originalDataURL = renderOriginalForExport();
                
                // 生成镜像导出图像
                const mirrorDataURL = renderMirrorForExport();
                
                if (!originalDataURL || !mirrorDataURL) {
                    exportInfo.innerHTML = `
                        <p class="info-text" style="color: orange;">Unable to generate export image. Please ensure that there is visible content.</p>
                    `;
                    return;
                }
                
                // 创建时间戳，用于文件名
                const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
                
                // 导出原始图像
                const originalLink = document.createElement('a');
                originalLink.download = `drawing-original-${timestamp}.png`;
                originalLink.href = originalDataURL;
                
                // 导出镜像图像
                const mirrorLink = document.createElement('a');
                mirrorLink.download = `drawing-mirror-${timestamp}.png`;
                mirrorLink.href = mirrorDataURL;
                
                // 导出反馈
                exportInfo.innerHTML = `
                    <p class="info-text" style="color: green;">Two PNG format images are ready to be exported</p>
                    <p class="info-text">1. Original: drawing-original-${timestamp}.png</p>
                    <p class="info-text">2. Mirrored: drawing-mirror-${timestamp}.png</p>
                    <p class="info-text">Size: 14cm × 7cm (300dpi)</p>
                `;
                
                // 触发下载
                document.body.appendChild(originalLink);
                document.body.appendChild(mirrorLink);
                originalLink.click();
                setTimeout(() => {
                    mirrorLink.click();
                    document.body.removeChild(originalLink);
                    document.body.removeChild(mirrorLink);
                }, 100);
            }
            
            // 初始设置
            setTool('pencil');
            document.querySelector('.color-btn').style.borderColor = '#333';
        });
    </script>
</body>
</html>
